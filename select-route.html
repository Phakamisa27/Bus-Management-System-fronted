<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select Your Route</title>
    <link rel="stylesheet" href="css/timeTable.css" />
  </head>
  <body>
    <header class="route">
      <button
        class="header-icon-btn back-btn"
        type="button"
        aria-label="Go back"
        onclick="goBack('dashBroad.html')"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M14.5 5.5L8 12l6.5 6.5"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
      <h2>Select Your Route</h2>
    </header>

    <main class="page-main">
      <div id="passengerAlerts" class="passenger-alerts" hidden></div>
      <div class="container route-panel">
        <h2 class="route-panel__title">Select Your Route</h2>

        <label for="areaInput">Select Area</label>
        <input type="text" id="areaInput" placeholder="Type area..." />
        <div id="areaSuggestions" class="suggestions"></div>

        <label for="destInput">Select Destination</label>
        <input
          type="text"
          id="destInput"
          placeholder="Type destination..."
          disabled
        />
        <div id="destSuggestions" class="suggestions"></div>

        <button id="findBtn" type="button">Find Buses</button>
        <p id="routeStatus" class="bus-status-text" role="status"></p>
      </div>
    </main>

    <script>
      function goBack(fallbackPage) {
        if (window.history.length > 1) {
          window.history.back();
          return;
        }
        window.location.href = fallbackPage;
      }
    </script>
    <script src="js/busDataStore.js"></script>
    <script src="js/selectRoute.js"></script>
  </body>
</html>
