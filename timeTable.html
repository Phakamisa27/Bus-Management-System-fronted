<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select Your Router</title>
    <link rel="stylesheet" href="css/timeTable.css" />
  </head>
  <body>
    <header class="route">
      <h2>Select Your Route</h2>
    </header>

    <div class="container">
      <h2>Select Your Route</h2>

      <label>Select Area</label>
      <input type="text" id="areaInput" placeholder="Type area..." />
      <div id="areaSuggestions" class="suggestions"></div>

      <label>Select Destination</label>
      <input
        type="text"
        id="destInput"
        placeholder="Type destination..."
        disabled
      />
      <div id="destSuggestions" class="suggestions"></div>

      <button id="findBtn">Find Buses</button>

      <ul id="busList"></ul>
    </div>

    <section>
      <h3 class="heads">Bus Live Location</h3>
    </section>

    <script src="js/timeTable.js"></script>
  </body>
</html>
