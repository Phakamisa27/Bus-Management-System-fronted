<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Available Buses</title>
    <link rel="stylesheet" href="css/timeTable.css" />
  </head>
  <body>
    <header class="route">
      <button
        class="header-icon-btn back-btn"
        type="button"
        aria-label="Go back"
        onclick="goBack('select-route.html')"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M14.5 5.5L8 12l6.5 6.5"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
      <h2>Available Buses</h2>
    </header>

    <main class="page-main">
      <section class="results-panel">
        <p id="selectedRoute" class="results-route" aria-live="polite"></p>

        <div
          class="day-tabs"
          id="dayTabs"
          role="tablist"
          aria-label="Select day of week"
        ></div>

        <ul id="busList" class="results-bus-list" aria-live="polite"></ul>
        <p id="busListStatus" class="bus-status-text" role="status"></p>
      </section>
    </main>

    <script>
      function goBack(fallbackPage) {
        if (window.history.length > 1) {
          window.history.back();
          return;
        }
        window.location.href = fallbackPage;
      }
    </script>
    <script src="js/bus-results.js"></script>
  </body>
</html>
