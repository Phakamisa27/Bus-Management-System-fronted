<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <style>
      :root {
        --primary: #1e73ff;
        --secondary: #ffffff;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        background: var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-card {
        width: 100%;
        max-width: 360px;
        background: var(--secondary);
        padding: 2rem;
        border-radius: 12px;
      }

      h1 {
        color: var(--primary);
        text-align: center;
        margin-bottom: 1.5rem;
      }

      .field {
        margin-bottom: 1rem;
      }

      label {
        display: block;
        color: var(--primary);
        margin-bottom: 0.4rem;
        font-size: 0.95rem;
      }

      input {
        width: 100%;
        padding: 0.7rem 0.8rem;
        border: 1px solid var(--primary);
        border-radius: 8px;
        color: var(--primary);
        background: var(--secondary);
      }

      input:focus {
        outline: none;
        box-shadow: 0 0 0 2px var(--primary);
      }

      button {
        width: 100%;
        padding: 0.75rem;
        border: none;
        border-radius: 8px;
        background: var(--primary);
        color: var(--secondary);
        cursor: pointer;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h1>Login</h1>
      <form action="#" method="post">
        <div class="field">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            placeholder="Enter your email"
            required
          />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            placeholder="Enter your password"
            required
          />
        </div>
        <button type="submit">Sign In</button>
      </form>
    </div>
  </body>
</html>
