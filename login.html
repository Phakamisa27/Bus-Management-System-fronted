<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <style>
      :root {
        --primary: #1e73ff;
        --secondary: #ffffff;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        background: var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      .login-card {
        width: 100%;
        max-width: 420px;
        background: var(--secondary);
        padding: 3rem 2.75rem;
        border-radius: 24px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
      }

      h1 {
        color: var(--primary);
        text-align: center;
        margin-bottom: 2.25rem;
        font-size: 1.9rem;
      }

      .field {
        margin-bottom: 1.5rem;
      }

      input {
        width: 100%;
        padding: 0.6rem 0.2rem;
        border: none;
        border-bottom: 2px solid rgba(30, 115, 255, 0.35);
        border-radius: 0;
        color: var(--primary);
        background: transparent;
        font-size: 1rem;
        transition: border-color 0.2s ease;
      }

      input::placeholder {
        color: rgba(30, 115, 255, 0.45);
      }

      input:focus {
        outline: none;
        border-bottom-color: var(--primary);
        box-shadow: none;
      }

      button {
        width: 100%;
        padding: 0.85rem;
        margin-top: 0.5rem;
        border: none;
        border-radius: 10px;
        background: var(--primary);
        color: var(--secondary);
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
      }

      .login-status {
        margin-top: 0.75rem;
        text-align: center;
        font-size: 0.9rem;
        word-break: break-word;
      }

      .form-links {
        margin-top: 1.75rem;
        text-align: center;
      }

      .form-links a {
        color: var(--primary);
        text-decoration: none;
        font-size: 0.92rem;
      }

      .form-links a:hover {
        text-decoration: underline;
      }

      .forgot-link {
        display: block;
        margin-bottom: 0.9rem;
      }

      .signup-text {
        color: var(--primary);
        font-size: 0.92rem;
      }

      .pw-wrap {
        position: relative;
      }

      .pw-wrap input {
        padding-right: 2.6rem;
      }

      .pw-toggle {
        position: absolute;
        top: 50%;
        right: 0.5rem;
        transform: translateY(-50%);
        width: 2rem;
        height: 2rem;
        margin: 0;
        padding: 0;
        background: transparent;
        border: none;
        border-radius: 6px;
        color: var(--primary);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-tap-highlight-color: transparent;
      }

      .pw-toggle:hover {
        background: rgba(30, 115, 255, 0.08);
      }

      .pw-toggle:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px var(--primary);
      }

      .pw-toggle .pw-icon {
        width: 1.25rem;
        height: 1.25rem;
        pointer-events: none;
        display: block;
      }

      .pw-toggle .pw-eye-open {
        display: none;
      }

      .pw-toggle .pw-eye-closed {
        display: block;
      }

      .pw-toggle.is-showing .pw-eye-open {
        display: block;
      }

      .pw-toggle.is-showing .pw-eye-closed {
        display: none;
      }

      /* Native password reveal/clear (Edge/Chromium): keep only custom .pw-toggle */
      .pw-wrap input[type="password"]::-ms-reveal,
      .pw-wrap input[type="password"]::-ms-clear {
        display: none;
        width: 0;
        height: 0;
      }

      .pw-wrap input[type="password"]::-webkit-credentials-auto-fill-button {
        display: none !important;
        visibility: hidden;
        pointer-events: none;
        height: 0;
        width: 0;
        margin: 0;
      }

      .pw-wrap
        input[type="password"]::-webkit-strong-password-auto-fill-button {
        display: none !important;
        visibility: hidden;
        pointer-events: none;
        height: 0;
        width: 0;
        margin: 0;
      }

      @media (max-width: 480px) {
        body {
          padding: 1rem;
        }

        .login-card {
          padding: 2rem 1.5rem;
          border-radius: 18px;
        }

        h1 {
          font-size: 1.6rem;
          margin-bottom: 1.75rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="login-card">
      <h1>Login</h1>
      <form id="loginForm" novalidate>
        <div class="field">
          <input
            id="email"
            type="email"
            placeholder="Enter your email"
            required
            autocomplete="email"
          />
        </div>
        <div class="field">
          <input
            id="password"
            type="password"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          />
        </div>
        <button type="submit">Login</button>
        <p id="loginStatus" class="login-status"></p>
        <div class="form-links">
          <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
          <span class="signup-text"
            >Don't have an account? <a href="register.html">Sign up</a></span
          >
        </div>
      </form>
    </div>
    <script src="js/apiConfig.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
