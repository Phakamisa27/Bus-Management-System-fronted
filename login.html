<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <style>
      :root {
        --primary: #1e73ff;
        --secondary: #ffffff;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        background: var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-card {
        width: 100%;
        max-width: 360px;
        background: var(--secondary);
        padding: 2rem;
        border-radius: 12px;
      }

      h1 {
        color: var(--primary);
        text-align: center;
        margin-bottom: 1.5rem;
      }

      .field {
        margin-bottom: 1rem;
      }

      label {
        display: block;
        color: var(--primary);
        margin-bottom: 0.4rem;
        font-size: 0.95rem;
      }

      input {
        width: 100%;
        padding: 0.7rem 0.8rem;
        border: 1px solid var(--primary);
        border-radius: 8px;
        color: var(--primary);
        background: var(--secondary);
      }

      input:focus {
        outline: none;
        box-shadow: 0 0 0 2px var(--primary);
      }

      button {
        width: 100%;
        padding: 0.75rem;
        border: none;
        border-radius: 8px;
        background: var(--primary);
        color: var(--secondary);
        cursor: pointer;
        font-size: 1rem;
      }

      .pw-wrap {
        position: relative;
      }

      .pw-wrap input {
        padding-right: 2.6rem;
      }

      .pw-toggle {
        position: absolute;
        top: 50%;
        right: 0.5rem;
        transform: translateY(-50%);
        width: 2rem;
        height: 2rem;
        margin: 0;
        padding: 0;
        background: transparent;
        border: none;
        border-radius: 6px;
        color: var(--primary);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-tap-highlight-color: transparent;
      }

      .pw-toggle:hover {
        background: rgba(30, 115, 255, 0.08);
      }

      .pw-toggle:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px var(--primary);
      }

      .pw-toggle .pw-icon {
        width: 1.25rem;
        height: 1.25rem;
        pointer-events: none;
        display: block;
      }

      .pw-toggle .pw-eye-open {
        display: none;
      }

      .pw-toggle .pw-eye-closed {
        display: block;
      }

      .pw-toggle.is-showing .pw-eye-open {
        display: block;
      }

      .pw-toggle.is-showing .pw-eye-closed {
        display: none;
      }

      /* Native password reveal/clear (Edge/Chromium): keep only custom .pw-toggle */
      .pw-wrap input[type="password"]::-ms-reveal,
      .pw-wrap input[type="password"]::-ms-clear {
        display: none;
        width: 0;
        height: 0;
      }

      .pw-wrap input[type="password"]::-webkit-credentials-auto-fill-button {
        display: none !important;
        visibility: hidden;
        pointer-events: none;
        height: 0;
        width: 0;
        margin: 0;
      }

      .pw-wrap
        input[type="password"]::-webkit-strong-password-auto-fill-button {
        display: none !important;
        visibility: hidden;
        pointer-events: none;
        height: 0;
        width: 0;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <div class="login-card">
      <h1>Login</h1>
      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            placeholder="Enter your email"
            required
            autocomplete="email"
          />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          />
        </div>
        <button type="submit">Sign In</button>
        <p id="loginStatus" class="login-status"></p>
        <a href="register.html">register here</a>
      </form>
    </div>
    <script src="js/login.js"></script>
  </body>
</html>
