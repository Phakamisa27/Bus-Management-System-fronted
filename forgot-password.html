<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forgot Password</title>
    <style>
      :root {
        --primary: #1e73ff;
        --secondary: #ffffff;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        background: var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      .login-card {
        width: 100%;
        max-width: 420px;
        background: var(--secondary);
        padding: 3rem 2.75rem;
        border-radius: 24px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
      }

      h1 {
        color: var(--primary);
        text-align: center;
        margin-bottom: 0.75rem;
        font-size: 1.9rem;
      }

      .intro {
        color: var(--primary);
        text-align: center;
        font-size: 0.92rem;
        margin-bottom: 2rem;
        opacity: 0.85;
      }

      .field {
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        color: var(--primary);
        margin-bottom: 0.5rem;
        font-size: 0.95rem;
      }

      input {
        width: 100%;
        padding: 0.6rem 0.2rem;
        border: none;
        border-bottom: 2px solid rgba(30, 115, 255, 0.35);
        border-radius: 0;
        color: var(--primary);
        background: transparent;
        font-size: 1rem;
        transition: border-color 0.2s ease;
      }

      input::placeholder {
        color: rgba(30, 115, 255, 0.45);
      }

      input:focus {
        outline: none;
        border-bottom-color: var(--primary);
        box-shadow: none;
      }

      button {
        width: 100%;
        padding: 0.85rem;
        margin-top: 0.5rem;
        border: none;
        border-radius: 10px;
        background: var(--primary);
        color: var(--secondary);
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
      }

      button:hover {
        opacity: 0.95;
      }

      .login-status {
        margin-top: 0.75rem;
        text-align: center;
        font-size: 0.9rem;
        word-break: break-word;
      }

      .form-links {
        margin-top: 1.75rem;
        text-align: center;
      }

      .form-links a {
        color: var(--primary);
        text-decoration: none;
        font-size: 0.92rem;
        font-weight: 600;
      }

      .form-links a:hover {
        text-decoration: underline;
      }

      @media (max-width: 480px) {
        body {
          padding: 1rem;
        }

        .login-card {
          padding: 2rem 1.5rem;
          border-radius: 18px;
        }

        h1 {
          font-size: 1.6rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="login-card">
      <h1>Forgot Password</h1>
      <p class="intro">Enter your account email to reset your password.</p>
      <form id="forgotPasswordForm" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            placeholder="Enter your email"
            required
            autocomplete="email"
          />
        </div>
        <button type="submit">Send Reset Link</button>
        <p id="forgotStatus" class="login-status"></p>
        <div class="form-links">
          <a href="login.html">Back to Login</a>
        </div>
      </form>
    </div>

    <script src="js/forgot-password.js"></script>
  </body>
</html>
